name: Build Telegram iOS (Custom)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false # Отключаем авто-загрузку, она всё ломает

      - name: Fix Submodules (Total Replace)
        run: |
          # Мы полностью удаляем старый файл ссылок и пишем новый с правильными адресами
          rm -f .gitmodules
          cat > .gitmodules <<EOF
          [submodule "submodules/TgVoipWebrtc/tgcalls"]
              path = submodules/TgVoipWebrtc/tgcalls
              url = https://github.com/TelegramMessenger/tgcalls.git
          [submodule "submodules/rlottie"]
              path = submodules/rlottie
              url = https://github.com/TelegramMessenger/rlottie.git
          [submodule "submodules/LottieCpp/lottiecpp"]
              path = submodules/LottieCpp/lottiecpp
              url = https://github.com/TelegramMessenger/lottiecpp.git
          EOF
          
          # Указываем Гитхабу брать всё остальное тоже из официального ТГ
          git config --global url."https://github.com/TelegramMessenger/".insteadOf "../"
          
          # Запускаем загрузку
          git submodule sync
          git submodule update --init --recursive --depth 1
          echo "Submodules downloaded successfully!"

      - name: Brand with web-pentest
        run: |
          # Вшиваем твой ник в файл, который точно есть
          echo "TPickMe by web-pentest (@sudo_pacman_s)" > AUTHOR.txt
          # Пытаемся заменить название в ресурсах (если не найдет - не страшно)
          grep -rl "Telegram" . --include="*.strings" | xargs sed -i '' 's/Telegram/TPickMe/g' || true

      - name: Install Tools
        run: |
          brew install bazelisk cmake ninja
          pip3 install --user requests

      - name: Setup API Keys
        run: |
          mkdir -p build-system/Make
          echo "api_id = " > build-system/Make/LocalConfiguration.py
          echo "api_hash = \"\"" >> build-system/Make/LocalConfiguration.py

      - name: Build App
        run: |
          python3 build-system/Make/Make.py \
            --bundle_id="com.webpentest.tpickme" \
            --api_id="" \
            --api_hash="" \
            build

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TPickMe-Package
          path: |
            build/artifacts/*.ipa
            *.log
