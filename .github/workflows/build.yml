name: Build Telegram iOS (Custom)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Fix Submodules and Links
        run: |
          # Исправляем пути к субмодулям
          sed -i '' 's|url = ../|url = https://github.com/TelegramMessenger/|g' .gitmodules
          git submodule update --init --recursive

      - name: Inject Creator Info (web-pentest)
        run: |
          # Меняем название в меню "О приложении"
          # Ищем файлы локализации и вставляем твои данные
          find . -name "Localizable.strings" -exec sed -i '' 's/"Settings.About"/"Created by web-pentest (tg: @sudo_pacman_s)"/g' {} +
          echo "Creator branding applied: web-pentest"

      - name: Setup API Keys
        run: |
          sed -i '' 's/api_id = .*/api_id = 35863075/g' build-system/Make/BuildConfiguration.py
          sed -i '' 's/api_hash = .*/api_hash = "33ce87c95e3caa7f07ea49e0bb01e114"/g' build-system/Make/BuildConfiguration.py

      - name: Install Dependencies
        run: |
          brew install cmake ninja
          pip3 install --user requests

      - name: Build App
        run: |
          python3 build-system/Make/Make.py \
            --bundle_id="com.webpentest.tpickme" \
            --api_id="35863075" \
            --api_hash="33ce87c95e3caa7f07ea49e0bb01e114" \
            build

      - name: Upload Result
        if: always() # Загрузить логи даже если сборка упала
        uses: actions/upload-artifact@v4
        with:
          name: TPickMe-Package
          path: |
            build/artifacts/*.ipa
            *.log
