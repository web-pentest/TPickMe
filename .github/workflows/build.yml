name: Build Telegram iOS (Custom)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false # Отключаем стандартную загрузку

      - name: Reset and Fix Submodules
        run: |
          # Принудительно заменяем ВСЕ ссылки на официальные в конфиге
          if [ -f .gitmodules ]; then
            sed -i '' 's|url = ../|url = https://github.com/TelegramMessenger/|g' .gitmodules
            sed -i '' 's|https://github.com/web-pentest/|https://github.com/TelegramMessenger/|g' .gitmodules
          fi
          
          # Очистка и жесткое обновление
          git submodule deinit -f . || true
          git submodule update --init --recursive --depth 1
          echo "Submodules are now pointing to TelegramMessenger and downloaded."

      - name: Add Your Branding
        run: |
          # Вписываем твой ник прямо в файл версии, это точно не сломает сборку
          echo "Created by web-pentest (@sudo_pacman_s)" > AUTHOR.txt
          # Пытаемся заменить текст в приложении
          sed -i '' 's/Telegram/TPickMe by web-pentest/g' Telegram/Telegram-iOS/Resources/Settings.About || true

      - name: Install Build Tools
        run: |
          brew install bazelisk cmake ninja
          pip3 install --user requests

      - name: Setup API Keys
        run: |
          # Создаем файл конфигурации с твоими ключами
          mkdir -p build-system/Make
          echo "api_id = 35863075" > build-system/Make/LocalConfiguration.py
          echo "api_hash = \"33ce87c95e3caa7f07ea49e0bb01e114\"" >> build-system/Make/LocalConfiguration.py

      - name: Build App (The Heavy Lift)
        run: |
          # Запуск самой сборки
          python3 build-system/Make/Make.py \
            --bundle_id="com.webpentest.tpickme" \
            --api_id="35863075" \
            --api_hash="33ce87c95e3caa7f07ea49e0bb01e114" \
            build

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TPickMe-Artifacts
          path: |
            build/artifacts/*.ipa
            *.log
