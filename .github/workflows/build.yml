name: Build Telegram iOS (Custom)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false # Сначала скачиваем только основной код

      - name: Fix and Sync Submodules
        run: |
          # Исправляем ссылки: заменяем относительные пути на прямые ссылки на TelegramMessenger
          sed -i '' 's|url = ../|url = https://github.com/TelegramMessenger/|g' .gitmodules
          git submodule update --init --recursive
          echo "Submodules fixed and updated."

      - name: Setup API Keys
        run: |
          sed -i '' 's/api_id = .*/api_id = 35863075/g' build-system/Make/BuildConfiguration.py
          sed -i '' 's/api_hash = .*/api_hash = "33ce87c95e3caa7f07ea49e0bb01e114"/g' build-system/Make/BuildConfiguration.py
          echo "API Keys injected successfully."

      - name: Build App
        run: |
          python3 build-system/Make/Make.py \
            --bundle_id="com.webpentest.tpickme" \
            --api_id="35863075" \
            --api_hash="33ce87c95e3caa7f07ea49e0bb01e114" \
            build

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: TPickMe-Installer
          path: build/artifacts/*.ipa
